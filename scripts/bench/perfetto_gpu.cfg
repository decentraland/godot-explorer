# Perfetto trace config for GPU profiling on Mali-class Android devices.
#
# Pre-req: AGI's libgpudataproducer.so producer must be running (activated
# by `gapit validate_gpu_profiling -device <serial>`). Without that the
# gpu.renderstages and gpu.counters tracks will be empty.
#
# Loaded by `scripts/bench/profile_android_gpu.sh` via:
#   adb shell "cat /data/local/tmp/perfetto_gpu.cfg | perfetto -c - --txt -o ..."

buffers: { size_kb: 131072 fill_policy: RING_BUFFER }

# Per-renderpass GPU timeline. The Mali producer emits one slice per
# logical renderpass (shadow map, forward opaque, transparent, post-fx
# steps, sky); each slice has start/end ns + driver tag.
data_sources: {
    config {
        name: "gpu.renderstages"
        target_buffer: 0
    }
}

# Per-counter HW samples. counter_period_ns=1ms gives us 1000 sample/s.
# counter_ids left empty so the producer auto-selects the Mali default
# set; that's BSP-specific and the producer enumerates what it can.
data_sources: {
    config {
        name: "gpu.counters"
        target_buffer: 0
        gpu_counter_config {
            counter_period_ns: 1000000
        }
    }
}

# GPU memory residency over time.
data_sources: {
    config {
        name: "android.gpu.memory"
        target_buffer: 0
    }
}

# SurfaceFlinger frame events — lets the trace correlate GPU work to
# the actual app frame numbers.
data_sources: {
    config {
        name: "android.surfaceflinger.frame"
        target_buffer: 0
    }
}

data_sources: {
    config {
        name: "android.surfaceflinger.frametimeline"
        target_buffer: 0
    }
}

# Process list — needed for filtering downstream.
data_sources: {
    config {
        name: "linux.process_stats"
        target_buffer: 0
        process_stats_config { scan_all_processes_on_start: true }
    }
}

# atrace markers from the explorer process so the trace ties Godot's
# render thread tags (Forward3DOpaque etc) to the renderstage timeline.
data_sources: {
    config {
        name: "linux.ftrace"
        target_buffer: 0
        ftrace_config {
            atrace_apps: "org.decentraland.godotexplorer"
            atrace_categories: "gfx"
            atrace_categories: "view"
            atrace_categories: "freq"
        }
    }
}
