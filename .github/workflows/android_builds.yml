name: 🤖 Android
on:
  workflow_call:
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      APK_ANDROID_KEYSTORE_BASE64:
        required: true
      APK_ANDROID_KEYSTORE_PASSWORD:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      SENTRY_ORG:
        required: true
      SENTRY_PROJECT:
        required: true
      # R2 mobile-artifacts bucket where the signed APK is published for download.
      # Optional: when unset the APK upload step is skipped (e.g. fork PRs).
      MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID:
        required: false
      MOBILE_ARTIFACTS_R2_SECRET_ACCESS_KEY:
        required: false
      MOBILE_ARTIFACTS_R2_ENDPOINT:
        required: false
      MOBILE_ARTIFACTS_R2_BUCKET:
        required: false

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ci-${{ github.actor }}-${{ github.head_ref || github.run_number }}-${{ github.ref }}-android
  cancel-in-progress: true

jobs:
  build:
    name: Build Android
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 35
    container:
      # image generated at: https://github.com/decentraland/godot-docker-builder
      image: quay.io/decentraland/dcl-godot-android-builder:62ef6ebf357897ac382d7a52ac80de20883d9e15
      volumes:
        - /home/user/.cache/devgodot:/github/home/.cache/devgodot
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Add safe directory
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.90"
          components: clippy, rustfmt
      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
      - name: Cargo install
        run: cargo run -- install --targets android linux

      - name: Set prod flag
        uses: ./.github/actions/set-prod-flag

      - name: Build Rust libraries
        run: |
          cargo run -- build --release ${{ env.PROD_FLAG }}
          cargo run -- build --release --target android ${{ env.PROD_FLAG }}
          cargo run -- import-assets
      
      - name: Export Android APK
        run: |
          cargo run -- export --target android --format apk --release
          mkdir -p android-debug-symbols
          cp godot/android/build/build/outputs/native-debug-symbols/standardRelease/native-debug-symbols.zip android-debug-symbols/ || true

      # Decode and setup keystore for APK signing
      - name: Setup APK Signing Keystore
        run: |
          echo "${{ secrets.APK_ANDROID_KEYSTORE_BASE64 }}" | base64 -d > apk-release.keystore
          ls -la apk-release.keystore

      # Sign the APK file
      - name: Sign Android APK
        run: |
          # Find Android build-tools
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"

          # Align the APK first (required for apksigner)
          ${BUILD_TOOLS_DIR}zipalign -v -p 4 exports/decentraland.godot.client.apk exports/decentraland.godot.client-aligned.apk

          # Sign the APK
          ${BUILD_TOOLS_DIR}apksigner sign --ks apk-release.keystore \
            --ks-pass pass:"${{ secrets.APK_ANDROID_KEYSTORE_PASSWORD }}" \
            --out exports/decentraland.godot.client-signed.apk \
            exports/decentraland.godot.client-aligned.apk

          # Verify the signature
          ${BUILD_TOOLS_DIR}apksigner verify --verbose exports/decentraland.godot.client-signed.apk

          # Replace unsigned with signed
          mv exports/decentraland.godot.client-signed.apk exports/decentraland.godot.client.apk
          rm exports/decentraland.godot.client-aligned.apk

      - name: Export Android AAB
        run: |
          cargo run -- export --target android --format aab --release

      # Decode and setup keystore for AAB signing
      - name: Setup AAB Signing Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > dclgodot.upload.jks
          ls -la dclgodot.upload.jks

      # Sign the AAB file
      - name: Sign Android AAB
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore dclgodot.upload.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -signedjar exports/decentraland.godot.client-signed.aab \
            exports/decentraland.godot.client.aab \
            upload

          # Verify the signature
          jarsigner -verify -verbose exports/decentraland.godot.client-signed.aab

          # Replace unsigned with signed
          mv exports/decentraland.godot.client-signed.aab exports/decentraland.godot.client.aab

      # Copy Android Artifacts
      - name: Copy Android Artifacts
        if: success() || failure()
        run: |
          pwd
          ls -la
          ls -la exports/
          mkdir -p android-artifacts-apk
          mkdir -p android-artifacts-aab
          mv exports/decentraland.godot.client.apk android-artifacts-apk/ || true
          mv exports/decentraland.godot.client.aab android-artifacts-aab/ || true

      # Upload the signed APK to the R2 mobile-artifacts bucket so it can be downloaded
      # directly (the PR build report and the Mobile Distribute Slack notification link here).
      # Keyed by branch + commit SHA so a download can target an exact build.
      - name: Upload APK to R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MOBILE_ARTIFACTS_R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.MOBILE_ARTIFACTS_R2_ENDPOINT }}
          AWS_S3_BUCKET: ${{ secrets.MOBILE_ARTIFACTS_R2_BUCKET }}
          # Public R2 domain mapped to the mobile-artifacts bucket root.
          R2_PUBLIC_BASE_URL: "https://mobile-artifacts.dclregenesislabs.xyz"
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_S3_BUCKET" ] || [ -z "$AWS_ENDPOINT_URL" ]; then
            echo "⚠️  R2 mobile-artifacts bucket not configured (MOBILE_ARTIFACTS_R2_* secrets), skipping APK upload"
            exit 0
          fi

          APK_PATH="android-artifacts-apk/decentraland.godot.client.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "⚠️  APK not found at $APK_PATH, skipping R2 upload"
            exit 0
          fi

          # The android builder image does not ship the AWS CLI; install v2 on demand.
          if ! command -v aws >/dev/null 2>&1; then
            echo "Installing AWS CLI v2..."
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q /tmp/awscliv2.zip -d /tmp
            /tmp/aws/install -i /tmp/aws-cli -b /tmp/aws-bin
            export PATH="/tmp/aws-bin:$PATH"
          fi

          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
          KEY="android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.apk"
          LATEST_KEY="android/${SAFE_BRANCH}/latest/decentraland.godot.client.apk"

          echo "📤 Uploading APK to s3://${AWS_S3_BUCKET}/${KEY}"
          aws s3 cp "$APK_PATH" "s3://${AWS_S3_BUCKET}/${KEY}" --endpoint-url "$AWS_ENDPOINT_URL"
          aws s3 cp "$APK_PATH" "s3://${AWS_S3_BUCKET}/${LATEST_KEY}" --endpoint-url "$AWS_ENDPOINT_URL"

          PUBLIC_URL="${R2_PUBLIC_BASE_URL}/${KEY}"
          echo "✅ APK uploaded to R2 (sha=${SHA}, branch=${SAFE_BRANCH})"
          echo "🔗 Public URL: ${PUBLIC_URL}"
          # Surface the direct download link to later steps (build report comment).
          echo "APK_PUBLIC_URL=${PUBLIC_URL}" >> "$GITHUB_ENV"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: AndroidAPK
          path: android-artifacts-apk/
          if-no-files-found: error

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: AndroidAAB
          path: android-artifacts-aab/
          if-no-files-found: error

      - name: Upload Android Debug Symbols
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: Android Native Debug Symbols
          path: android-debug-symbols/
          if-no-files-found: error
        
      # Upload debug symbols to Sentry for production builds
      - name: Upload debug symbols to Sentry
        if: success()
        shell: bash
        run: |
          EXPLORER_VERSION=$(cargo run -- explorer-version)
          echo "Explorer version: $EXPLORER_VERSION"

          # Check if this is a production build (no -dev suffix)
          if [[ ! "$EXPLORER_VERSION" =~ -dev$ ]]; then
            echo "Production build detected, uploading debug symbols to Sentry..."
            RELEASE_NAME="org.decentraland.godotexplorer@$EXPLORER_VERSION"
            echo "Release name: $RELEASE_NAME"

            # Install sentry-cli
            curl -sL https://sentry.io/get-cli/ | bash

            # Upload libdclgodot.so (our Rust library with embedded debug symbols)
            LIBDCLGODOT_PATH="lib/target/libdclgodot_android/libdclgodot.so"

            if [ -f "$LIBDCLGODOT_PATH" ]; then
              echo "Uploading libdclgodot debug symbols..."
              ls -lh "$LIBDCLGODOT_PATH"

              sentry-cli upload-dif \
                --org ${{ secrets.SENTRY_ORG }} \
                --project ${{ secrets.SENTRY_PROJECT }} \
                --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }} \
                --include-sources \
                --wait \
                "$LIBDCLGODOT_PATH"

              echo "✅ libdclgodot debug symbols uploaded"
            else
              echo "⚠️  libdclgodot.so not found at $LIBDCLGODOT_PATH"
            fi

            # Upload libgodot_android debug symbols from native-debug-symbols.zip
            # Search for the file as the path varies by build variant
            NATIVE_DEBUG_ZIP=$(find godot/android/build/build/outputs/native-debug-symbols -name "native-debug-symbols.zip" 2>/dev/null | head -1 || true)

            if [ -n "$NATIVE_DEBUG_ZIP" ] && [ -f "$NATIVE_DEBUG_ZIP" ]; then
              echo "Found native-debug-symbols.zip at: $NATIVE_DEBUG_ZIP"
              echo "Extracting Godot debug symbols..."
              mkdir -p /tmp/godot-debug-symbols
              unzip -o "$NATIVE_DEBUG_ZIP" "*/libgodot_android.so.dbg" -d /tmp/godot-debug-symbols || true

              GODOT_DBG=$(find /tmp/godot-debug-symbols -name "libgodot_android.so.dbg" 2>/dev/null | head -1 || true)
              if [ -n "$GODOT_DBG" ]; then
                echo "Uploading libgodot_android debug symbols..."
                ls -lh "$GODOT_DBG"

                sentry-cli upload-dif \
                  --org ${{ secrets.SENTRY_ORG }} \
                  --project ${{ secrets.SENTRY_PROJECT }} \
                  --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }} \
                  --wait \
                  "$GODOT_DBG"

                echo "✅ libgodot_android debug symbols uploaded"
              else
                echo "⚠️  libgodot_android.so.dbg not found in zip"
              fi
            else
              echo "⚠️  native-debug-symbols.zip not found, trying AAR fallback..."

              # Fallback: extract from godot-lib AAR (contains unstripped .so with debug symbols)
              GODOT_AAR="godot/android/build/libs/release/godot-lib.template_release.aar"
              if [ -f "$GODOT_AAR" ]; then
                echo "Extracting libgodot_android.so from AAR..."
                mkdir -p /tmp/godot-aar
                unzip -o "$GODOT_AAR" "jni/arm64-v8a/libgodot_android.so" -d /tmp/godot-aar

                GODOT_SO=$(find /tmp/godot-aar -name "libgodot_android.so" 2>/dev/null | head -1 || true)
                if [ -n "$GODOT_SO" ]; then
                  echo "Uploading libgodot_android from AAR..."
                  ls -lh "$GODOT_SO"

                  sentry-cli upload-dif \
                    --org ${{ secrets.SENTRY_ORG }} \
                    --project ${{ secrets.SENTRY_PROJECT }} \
                    --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }} \
                    --wait \
                    "$GODOT_SO"

                  echo "✅ libgodot_android uploaded from AAR"
                else
                  echo "⚠️  libgodot_android.so not found in AAR"
                fi
              else
                echo "⚠️  Godot AAR not found at $GODOT_AAR"
                find godot/android/build -name "*.aar" 2>/dev/null || true
              fi
            fi

            echo "Debug symbols uploaded successfully to release: $RELEASE_NAME"
          else
            echo "Development build detected (-dev suffix found), skipping Sentry upload"
          fi

      # Build Report Comment
      - name: Prepare Build Report
        if: github.event_name == 'pull_request' && always()
        run: |
          ARTIFACTS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Determine build status
          if [ "${{ job.status }}" = "success" ]; then
            ANDROID_STATUS="✅ Success"
            # Prefer the direct R2 download link when the APK was uploaded.
            if [ -n "${APK_PUBLIC_URL:-}" ]; then
              APK_LINK="[📱 Download APK](${APK_PUBLIC_URL})"
            else
              APK_LINK="[📱 Download APK](${ARTIFACTS_URL}/artifacts)"
            fi
            AAB_LINK="[📦 Download AAB](${ARTIFACTS_URL}/artifacts)"
            SYMBOLS_LINK="[🔧 Debug Symbols](${ARTIFACTS_URL}/artifacts)"
          else
            ANDROID_STATUS="❌ Failed"
            APK_LINK="Build failed"
            AAB_LINK="Build failed"
            SYMBOLS_LINK="Build failed"
          fi

          {
            echo "## 📦 Build Report"
            echo ""
            echo "### 🤖 Android"
            echo ""
            echo "| Artifact | Status |"
            echo "|----------|--------|"
            echo "| APK | ${APK_LINK} |"
            echo "| AAB | ${AAB_LINK} |"
            echo "| Debug Symbols | ${SYMBOLS_LINK} |"
            echo ""
            echo "**Build Status**: ${ANDROID_STATUS}"
            echo ""
            echo "### 🍏 iOS"
            echo ""
            echo "> The signed APK is uploaded to R2 on every build (link above). Add the \`build\` label (alias: \`build-ios\`) to build & ship iOS to TestFlight and post a Slack \"Android build ready\" notification."
            echo ""
            echo "---"
            echo ""
            echo "🔗 **Workflow Run**: [View logs](${ARTIFACTS_URL})"
            echo ""
            echo "🔄 **Updated**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } > build-report.md

      - name: Comment PR with Build Report
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: build-report
          path: build-report.md