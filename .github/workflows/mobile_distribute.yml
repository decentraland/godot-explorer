name: 📱 Mobile Build & Distribute (iOS TestFlight + Android APK)

# Single entry point that builds & distributes BOTH mobile platforms:
#   - iOS    → unsigned export uploaded to R2, then repository_dispatch to the
#              godot-asc-deploy repo which signs it and uploads to TestFlight
#   - Android → APK is already uploaded to the R2 mobile-artifacts bucket by the
#               regular Android CI build (android_builds.yml) for every commit; this
#               workflow waits for that commit's APK and posts a Slack "build ready"
#               notification + PR comment with the direct download link.
#
# Triggered by:
#   - Every push to `release` (full distribution)
#   - A weekday (Mon–Fri) 09:00 UTC cron on `main` — only when main changed since the
#     last successful main distribution (no point re-shipping an identical commit)
#   - The `build` label on a PR (alias: `build-ios` for backward compatibility)
#   - Manual workflow dispatch on the main / release branch
#
# The Android leg does NOT rebuild and does NOT distribute to a store — it only
# surfaces the R2 download link once the APK is ready. For main/release builds it
# additionally surfaces the AAB (Play Store artifact) the same way.
on:
  push:
    branches:
      - release          # every release push → full distribution
  schedule:
    - cron: '0 9 * * 1-5'  # weekdays 09:00 UTC → main, only if changed since last build
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build & distribute'
        required: true
        type: choice
        default: 'main'
        options:
          - main
          - release
      whats_new:
        description: 'TestFlight "What to Test" notes (optional; auto-generated from the commit when empty)'
        required: false
        type: string
        default: ''

permissions:
  pull-requests: write
  contents: read
  actions: write

jobs:
  prepare:
    name: Prepare distribution
    # Run for: push to release, the weekday main cron, a manual dispatch, or the
    # build / build-ios label on a PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      github.event.label.name == 'build' ||
      github.event.label.name == 'build-ios'
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ctx.outputs.ref }}
      sha: ${{ steps.ctx.outputs.sha }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      safe_branch: ${{ steps.ctx.outputs.safe_branch }}
      # Defaults to 'true' for every event except the cron, where the change-detection
      # step below may set it to 'false' when main is unchanged since the last build.
      should_build: ${{ steps.changes.outputs.should_build || 'true' }}
      # Only the dynamic thread ts flows via outputs. The channel ID is a SECRET and GitHub
      # masks secrets out of job outputs (they arrive empty downstream), so every job reads
      # SLACK_CHANNEL straight from secrets.SLACK_CHANNEL_ID instead.
      slack_ts: ${{ steps.slack.outputs.ts }}
      triggered_by: ${{ steps.ctx.outputs.triggered_by }}
      pr_url: ${{ steps.ctx.outputs.pr_url }}
      commit_short: ${{ steps.ctx.outputs.commit_short }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve build context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ github.event.inputs.ref }}"
            SHA=$(gh api "repos/${{ github.repository }}/commits/${REF}" --jq '.sha')
            PR_NUMBER=""
            TRIGGERED_BY="manual by ${{ github.actor }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            REF="${{ github.ref_name }}"; SHA="${{ github.sha }}"; PR_NUMBER=""
            TRIGGERED_BY="daily trigger"
          elif [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"; SHA="${{ github.sha }}"; PR_NUMBER=""
            TRIGGERED_BY="push to ${REF}"
          else
            REF="${{ github.event.pull_request.head.ref }}"
            SHA="${{ github.event.pull_request.head.sha }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            TRIGGERED_BY="label by ${{ github.actor }}"
          fi
          SAFE_BRANCH=$(echo "$REF" | tr '/' '-')
          PR_URL=""
          [ -n "$PR_NUMBER" ] && PR_URL="${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUMBER}"
          {
            echo "ref=$REF"
            echo "sha=$SHA"
            echo "pr_number=$PR_NUMBER"
            echo "safe_branch=$SAFE_BRANCH"
            echo "triggered_by=$TRIGGERED_BY"
            echo "pr_url=$PR_URL"
            echo "commit_short=${SHA:0:7}"
          } >> "$GITHUB_OUTPUT"
          echo "Distributing ref=$REF sha=$SHA pr=$PR_NUMBER trigger=$TRIGGERED_BY"

      - name: Check main for changes since last successful distribution
        id: changes
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_SHA="${{ github.sha }}"
          # Last *successful* mobile_distribute run on main (cron or dispatch-on-main).
          # PR-label runs live on the PR head branch and push-to-release on `release`,
          # so --branch main isolates the real main distributions.
          LAST_SHA=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow mobile_distribute.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""')
          if [ -n "$LAST_SHA" ] && [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  main unchanged since last distribution ($LAST_SHA) — skipping."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "🆕 main changed (last=${LAST_SHA:-none} current=$CURRENT_SHA) — building."
          fi

      - name: Post Slack root message
        id: slack
        if: steps.changes.outputs.should_build != 'false'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          STATUS: building
          BRANCH: ${{ steps.ctx.outputs.ref }}
          TRIGGERED_BY: ${{ steps.ctx.outputs.triggered_by }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          PR_URL: ${{ steps.ctx.outputs.pr_url }}
          COMMIT: ${{ steps.ctx.outputs.commit_short }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.ctx.outputs.sha }}
          IOS_LINE: "⏳ building"
          ANDROID_LINE: "⏳ building"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 .github/scripts/slack-root.py

      - name: Remove trigger label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --remove-label "${{ github.event.label.name }}" || true

      - name: Cancel previous distribution runs for this branch
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for STATUS in in_progress queued; do
            IDS=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow mobile_distribute.yml \
              --branch "${{ github.event.pull_request.head.ref }}" \
              --status "$STATUS" \
              --json databaseId \
              --jq '.[].databaseId')
            for ID in $IDS; do
              if [ -n "$ID" ] && [ "$ID" != "${{ github.run_id }}" ]; then
                echo "Cancelling previous run: $ID"
                gh run cancel "$ID" --repo "${{ github.repository }}" || true
              fi
            done
          done

      - name: Post distribution started comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMENT_BODY="---

          ### 📱 Mobile Distribution Triggered

          🍏 **iOS** → TestFlight &nbsp;&nbsp;|&nbsp;&nbsp; 🤖 **Android** → APK ready (R2) + Slack notification

          🔗 **Workflow**: [View run](${WORKFLOW_URL})

          📍 **Branch**: \`${{ github.event.pull_request.head.ref }}\`

          🔄 **Triggered**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("Mobile Distribution") or contains("iOS Build Triggered") or contains("build-report-ios")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="${COMMENT_BODY}"
          fi

  # iOS leg, step 1: build the unsigned Godot export and publish it to R2 (no Apple creds).
  # Before paying for a WarpBuild rebuild, check whether the self-hosted iOS runner already produced
  # (or is producing) the unsigned export for THIS exact commit in R2 (ios_self_hosted.yml uploads it
  # on every push). If so, skip the rebuild and sign that artifact directly (ios-dispatch). Mirrors
  # android-notify's R2 poll + fail-fast.
  ios-resolve:
    name: 🍏 iOS — resolve (reuse existing export?)
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      reuse: ${{ steps.resolve.outputs.reuse }}
      build_version: ${{ steps.resolve.outputs.build_version }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MOBILE_ARTIFACTS_R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.MOBILE_ARTIFACTS_R2_ENDPOINT }}
      AWS_S3_BUCKET: ${{ secrets.MOBILE_ARTIFACTS_R2_BUCKET }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:   ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_TS:        ${{ needs.prepare.outputs.slack_ts }}
      REF:         ${{ needs.prepare.outputs.ref }}
      SHA:         ${{ needs.prepare.outputs.sha }}
      SAFE_BRANCH: ${{ needs.prepare.outputs.safe_branch }}
      GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$AWS_S3_BUCKET" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_BUCKET"
          [ -z "$AWS_ENDPOINT_URL" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_ENDPOINT"
          [ -z "$AWS_ACCESS_KEY_ID" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID"
          if [ -n "$MISSING" ]; then echo "❌ Missing required secrets:$MISSING"; exit 1; fi
          echo "✅ Required secrets present"

      - name: Resolve reuse vs build
        id: resolve
        run: |
          KEY="ios/${SAFE_BRANCH}/${SHA}/export.tar.gz"
          echo "Looking for an existing unsigned export at s3://${AWS_S3_BUCKET}/${KEY}"
          echo "(produced by the self-hosted iOS runner — ios_self_hosted.yml — for this commit)"
          have_export() { aws s3api head-object --bucket "$AWS_S3_BUCKET" --key "$KEY" --endpoint-url "$AWS_ENDPOINT_URL" >/dev/null 2>&1; }

          reuse=false
          if have_export; then
            echo "✅ Export already present — reusing it (no WarpBuild rebuild)."
            reuse=true
          else
            # The self-hosted build for this commit may still be in flight (~12 min). Poll for it,
            # but fail fast (→ build on CI) the moment that run concludes without a usable export.
            DEADLINE=$(( $(date +%s) + 20 * 60 ))
            while true; do
              if have_export; then echo "✅ Export appeared — reusing it."; reuse=true; break; fi
              CONCLUSION=$(gh run list --repo "${{ github.repository }}" --workflow ios_self_hosted.yml \
                --limit 100 --json headSha,conclusion \
                --jq "first(.[] | select(.headSha==\"$SHA\")) | .conclusion // empty" 2>/dev/null || true)
              case "$CONCLUSION" in
                failure|cancelled|skipped|timed_out|success)
                  echo "ℹ️  self-hosted run for $SHA concluded '$CONCLUSION' with no usable export → building on CI."
                  break ;;
              esac
              if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                echo "ℹ️  timed out waiting for the self-hosted export → building on CI."
                break
              fi
              sleep 30
            done
          fi
          echo "reuse=$reuse" >> "$GITHUB_OUTPUT"

          # In the reuse path nobody runs the lib build that writes .build.version, so reconstruct it
          # deterministically (matches lib/build.rs: <lib-version>-<short-sha>-<prod|staging>).
          LIB_VERSION=$(grep -m1 '^version' lib/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$REF" = "release" ]; then SUFFIX="prod"; else SUFFIX="staging"; fi
          echo "build_version=${LIB_VERSION}-${SHA:0:7}-${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "→ reuse=$reuse · build_version=${LIB_VERSION}-${SHA:0:7}-${SUFFIX}"

      - name: Slack — iOS reuse decision
        if: env.SLACK_TS != ''
        run: |
          if [ "${{ steps.resolve.outputs.reuse }}" = "true" ]; then
            bash .github/scripts/slack-reply.sh "♻️ iOS — found an existing export for this commit; skipping the CI rebuild."
          else
            bash .github/scripts/slack-reply.sh "🔨 iOS — no existing export; building on CI."
          fi

  ios-build:
    name: 🍏 iOS → R2 (unsigned export)
    needs: [prepare, ios-resolve]
    if: needs.prepare.outputs.should_build == 'true' && needs.ios-resolve.outputs.reuse == 'false'
    uses: ./.github/workflows/ios_r2_artifact.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}
      sha: ${{ needs.prepare.outputs.sha }}
      pr_number: ${{ needs.prepare.outputs.pr_number }}
      slack_ts: ${{ needs.prepare.outputs.slack_ts }}
      # Fire the godot-asc-deploy handoff from INSIDE ios-build, right after the export lands
      # in R2 — so the deploy starts immediately and runs in parallel with the Sentry upload
      # (instead of a separate job that waits for the whole build incl. Sentry to finish).
      dispatch_deploy: true
      triggered_by: ${{ needs.prepare.outputs.triggered_by }}
      whats_new: ${{ github.event.inputs.whats_new }}
    secrets: inherit

  # Reuse path: an unsigned export for this commit already exists in R2 (built by the self-hosted
  # runner), so skip WarpBuild and hand off to godot-asc-deploy directly with the same payload.
  ios-dispatch:
    name: 🍏 iOS — dispatch (reuse existing export)
    needs: [prepare, ios-resolve]
    if: needs.prepare.outputs.should_build == 'true' && needs.ios-resolve.outputs.reuse == 'true'
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:   ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_TS:        ${{ needs.prepare.outputs.slack_ts }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Same idempotent-per-SHA allocator the build path uses → returns the SAME number the
      # self-hosted build already allocated for this commit (sets DCL_BUILD_NUMBER).
      - name: Compute build number
        uses: ./.github/actions/compute-build-number
        with:
          sha: ${{ needs.prepare.outputs.sha }}
          secret: ${{ secrets.BUILD_NUMBER_SECRET }}
          allocated-by: ios

      - name: Dispatch godot-asc-deploy (sign & upload to TestFlight)
        uses: ./.github/actions/dispatch-asc-deploy
        with:
          gh-token: ${{ secrets.ASC_DEPLOY_DISPATCH_TOKEN }}
          ref: ${{ needs.prepare.outputs.ref }}
          sha: ${{ needs.prepare.outputs.sha }}
          whats_new: ${{ github.event.inputs.whats_new }}
          pr_number: ${{ needs.prepare.outputs.pr_number }}
          slack_ts: ${{ needs.prepare.outputs.slack_ts }}
          build_version: ${{ needs.ios-resolve.outputs.build_version }}
          build_number: ${{ env.DCL_BUILD_NUMBER }}
          triggered_by: ${{ needs.prepare.outputs.triggered_by }}

      - name: Slack — handed off (reused export)
        if: success() && env.SLACK_TS != ''
        run: |
          bash .github/scripts/slack-reply.sh "♻️🤝 iOS — reused export, handed off to the signing pipeline (godot-asc-deploy)."

      - name: Slack — handoff failed
        if: failure() && env.SLACK_TS != ''
        run: |
          bash .github/scripts/slack-reply.sh "❌ iOS — failed to hand off to the signing pipeline (check ASC_DEPLOY_DISPATCH_TOKEN)."

  # iOS hands off the deploy from either ios-build (rebuild path) or ios-dispatch (reuse path). If
  # resolve, build, or dispatch fails/cancels, godot-asc-deploy never runs, so nothing would move
  # the root card off BUILDING — this finalizes it. A skipped leg (the path not taken) is ignored.
  # It can't clobber the deploy repo's own root update (the deploy didn't run).
  root-failed:
    name: 🛑 Finalize root (failed/cancelled)
    needs: [prepare, ios-resolve, ios-build, ios-dispatch]
    if: >-
      always() && needs.prepare.outputs.should_build == 'true' && (
        needs.ios-resolve.result == 'failure' || needs.ios-resolve.result == 'cancelled' ||
        needs.ios-build.result == 'failure' || needs.ios-build.result == 'cancelled' ||
        needs.ios-dispatch.result == 'failure' || needs.ios-dispatch.result == 'cancelled' )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Update root → failed/cancelled
        if: needs.prepare.outputs.slack_ts != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_TS: ${{ needs.prepare.outputs.slack_ts }}
          TRIGGERED_BY: ${{ needs.prepare.outputs.triggered_by }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          PR_URL: ${{ needs.prepare.outputs.pr_url }}
          COMMIT: ${{ needs.prepare.outputs.commit_short }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.prepare.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IOS_RESOLVE_RESULT: ${{ needs.ios-resolve.result }}
          IOS_BUILD_RESULT: ${{ needs.ios-build.result }}
          IOS_DISPATCH_RESULT: ${{ needs.ios-dispatch.result }}
        run: |
          # Don't set ANDROID_LINE — merge-on-read preserves whatever the Android leg wrote.
          # Pick whichever leg actually failed; the path not taken is 'skipped' and ignored.
          if [ "$IOS_RESOLVE_RESULT" = "cancelled" ] || [ "$IOS_BUILD_RESULT" = "cancelled" ] || [ "$IOS_DISPATCH_RESULT" = "cancelled" ]; then
            export STATUS="cancelled"; export IOS_LINE="⚠️ cancelled"
          else
            export STATUS="failed"; export IOS_LINE="❌ build/handoff failed"
          fi
          python3 .github/scripts/slack-root.py

  android-notify:
    name: 🤖 Android → APK ready
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MOBILE_ARTIFACTS_R2_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.MOBILE_ARTIFACTS_R2_ENDPOINT }}
      AWS_S3_BUCKET: ${{ secrets.MOBILE_ARTIFACTS_R2_BUCKET }}
      # Public R2 domain mapped to the mobile-artifacts bucket root.
      R2_PUBLIC_BASE_URL: "https://mobile-artifacts.dclregenesislabs.xyz"
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:   ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_TS:        ${{ needs.prepare.outputs.slack_ts }}
      REF: ${{ needs.prepare.outputs.ref }}
      SHA: ${{ needs.prepare.outputs.sha }}
      PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
      SAFE_BRANCH: ${{ needs.prepare.outputs.safe_branch }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Slack — Android build started
        if: env.SLACK_TS != ''
        run: |
          bash .github/scripts/slack-reply.sh "🤖 Android — waiting for the signed APK from CI… (${REF})"

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$AWS_S3_BUCKET" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_BUCKET"
          [ -z "$AWS_ENDPOINT_URL" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_ENDPOINT"
          [ -z "$AWS_ACCESS_KEY_ID" ] && MISSING="$MISSING MOBILE_ARTIFACTS_R2_ACCESS_KEY_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ Required secrets present"

      - name: Wait for Android APK in R2
        run: |
          KEY="android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.apk"
          echo "Waiting for s3://${AWS_S3_BUCKET}/${KEY}"
          echo "(produced by the Android CI build — android_builds.yml — for this commit)"

          # Build CI takes ~35 min; give it headroom but fail fast if CI already failed.
          DEADLINE=$(( $(date +%s) + 50 * 60 ))
          INPROG=0
          while true; do
            if aws s3 ls "s3://${AWS_S3_BUCKET}/${KEY}" --endpoint-url "$AWS_ENDPOINT_URL" >/dev/null 2>&1; then
              echo "✅ APK is available in R2"
              break
            fi

            # Fail fast if the CI run for this commit already finished without an APK.
            CONCLUSION=$(gh run list --repo "${{ github.repository }}" --workflow runner.yml \
              --limit 100 --json headSha,conclusion \
              --jq "first(.[] | select(.headSha==\"$SHA\") | .conclusion) // empty" 2>/dev/null || true)
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$CONCLUSION" = "timed_out" ]; then
              echo "❌ Android CI build for $SHA concluded '$CONCLUSION' and no APK was produced."
              exit 1
            fi

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "❌ Timed out waiting for the APK in R2 ($KEY)."
              echo "   Make sure the Android CI build for this commit succeeded."
              exit 1
            fi
            if [ "$INPROG" = "0" ] && [ -n "${SLACK_CHANNEL:-}" ]; then
              bash .github/scripts/slack-reply.sh "🤖 Android — CI build in progress, waiting for the APK to land in R2…"
              INPROG=1
            fi
            echo "⏳ Not ready yet (CI conclusion='${CONCLUSION:-pending}'), retrying in 30s..."
            sleep 30
          done

      - name: Slack — Android APK ready
        if: success() && env.SLACK_TS != ''
        run: |
          APK="${R2_PUBLIC_BASE_URL}/android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.apk"
          bash .github/scripts/slack-reply.sh "✅ Android — APK ready: ${APK}"
          ANDROID_LINE="✅ APK ready" APK_URL="$APK" python3 .github/scripts/slack-root.py

      - name: Slack — Android failed
        if: failure() && env.SLACK_TS != ''
        run: |
          bash .github/scripts/slack-reply.sh "❌ Android — APK not produced for ${SHA} (CI build failed)"
          ANDROID_LINE="❌ CI build failed" python3 .github/scripts/slack-root.py

      # The AAB (Play Store artifact) is only published for main/release builds, so we
      # surface it for any main/release distribution (manual dispatch, push-to-release,
      # or the weekday main cron). Best-effort: if the AAB isn't in R2 we warn and skip
      # rather than failing the job.
      - name: Wait for Android AAB in R2
        if: success() && (needs.prepare.outputs.ref == 'main' || needs.prepare.outputs.ref == 'release')
        run: |
          KEY="android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.aab"
          echo "Waiting for s3://${AWS_S3_BUCKET}/${KEY}"

          # The AAB is uploaded in the same CI step as the APK, so it should already be
          # present now that the APK wait succeeded — short timeout is enough.
          DEADLINE=$(( $(date +%s) + 15 * 60 ))
          while true; do
            if aws s3 ls "s3://${AWS_S3_BUCKET}/${KEY}" --endpoint-url "$AWS_ENDPOINT_URL" >/dev/null 2>&1; then
              echo "✅ AAB is available in R2"
              echo "AAB_READY=true" >> "$GITHUB_ENV"
              break
            fi
            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "⚠️  AAB not found in R2 after timeout ($KEY) — skipping AAB notification."
              echo "AAB_READY=false" >> "$GITHUB_ENV"
              break
            fi
            echo "⏳ AAB not ready yet, retrying in 20s..."
            sleep 20
          done

      - name: Slack — Android AAB ready
        if: success() && env.AAB_READY == 'true' && env.SLACK_TS != ''
        run: |
          bash .github/scripts/slack-reply.sh "📦 Android — AAB ready (Play Store): ${R2_PUBLIC_BASE_URL}/android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.aab"

      - name: Update PR comment - Android success
        if: success() && needs.prepare.outputs.pr_number != ''
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          APK_URL="${R2_PUBLIC_BASE_URL}/android/${SAFE_BRANCH}/${SHA}/decentraland.godot.client.apk"
          COMMENT_BODY="---

          ### 🤖 Android Build Ready

          ✅ **Status**: APK available for download

          📱 **Download APK**: [direct link](${APK_URL})

          🔗 **Workflow**: [View run](${WORKFLOW_URL})

          📍 **Branch**: \`${REF}\` &nbsp;&nbsp;|&nbsp;&nbsp; **Commit**: \`${SHA}\`

          🔄 **Completed**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("🤖 Android Build")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="${COMMENT_BODY}"
          fi

      - name: Update PR comment - Android failure
        if: failure() && needs.prepare.outputs.pr_number != ''
        run: |
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMENT_BODY="---

          ### 🤖 Android Build Failed

          ❌ **Status**: No APK was produced for this commit

          🔗 **Workflow**: [View logs](${WORKFLOW_URL})

          📍 **Branch**: \`${REF}\` &nbsp;&nbsp;|&nbsp;&nbsp; **Commit**: \`${SHA}\`

          🔄 **Failed**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("🤖 Android Build")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" -f body="${COMMENT_BODY}"
          fi
