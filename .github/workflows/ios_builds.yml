name: 🍏 iOS
on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch to build'
        required: false
        type: string
        default: 'main'
      pr_number:
        description: 'PR number to update with build status (optional)'
        required: false
        type: string
        default: ''
      whats_new:
        description: 'TestFlight "What to Test" notes (optional; auto-generated from the commit when empty)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Build & sign but skip the TestFlight upload (validation only)'
        required: false
        type: boolean
        default: false
    secrets:
      SENTRY_AUTH_TOKEN:
        required: false
      SENTRY_ORG:
        required: false
      SENTRY_PROJECT:
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build — main, release, or any feature branch (for dry-run validation)'
        required: true
        type: string
        default: 'main'
      whats_new:
        description: 'TestFlight "What to Test" notes (optional; auto-generated from the commit when empty)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Build & sign but skip the TestFlight upload (validation only)'
        required: false
        type: boolean
        default: false
permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ci-${{ github.actor }}-${{ github.head_ref || github.run_number }}-${{ github.ref }}-ios
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS
    # main/release → ios-releases (auto, branch-restricted). Anything else (PR-label
    # builds) → ios-pr-testflight (reviewer-gated, prevent_self_review). The branch
    # policy on ios-releases is the safety net keeping the no-reviewer env limited.
    environment: ${{ ((inputs.ref || github.event.inputs.ref) == 'main' || (inputs.ref || github.event.inputs.ref) == 'release') && 'ios-releases' || 'ios-pr-testflight' }}
    strategy:
      fail-fast: false
    runs-on: warp-macos-14-arm64-6x
    timeout-minutes: 45
    steps:
      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          DRY_RUN: ${{ inputs.dry_run || github.event.inputs.dry_run }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Apple secrets come from the environment (ios-releases / ios-pr-testflight).
          # Only check presence — never echo a value (public repo, logs are world-readable).
          MISSING=""
          # Signing material is always required (needed to build & sign the .ipa).
          for V in IOS_DIST_CERT_P12 IOS_DIST_CERT_PASSWORD IOS_PROVISIONING_PROFILE; do
            eval "VAL=\${$V:-}"
            [ -z "$VAL" ] && MISSING="$MISSING $V"
          done
          # ASC_* are only needed for the actual upload, so a dry_run doesn't require them.
          if [ "${DRY_RUN:-}" != "true" ]; then
            for V in ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY_P8; do
              eval "VAL=\${$V:-}"
              [ -z "$VAL" ] && MISSING="$MISSING $V"
            done
          else
            echo "ℹ️  dry_run: skipping ASC_* requirement (build + sign only, no upload)."
          fi
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required environment secrets:$MISSING"
            echo "   Load them into the environment used by this run — see docs/IOS_TESTFLIGHT_ACCOUNT_HOLDER_SETUP.md"
            exit 1
          fi
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "⚠️  Sentry secrets not configured — dSYM upload will be skipped."
          fi
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "⚠️  SLACK_WEBHOOK_URL not configured — Slack notifications skipped."
          fi
          echo "✅ Required secrets present"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # @stable
        with:
          toolchain: "1.90"
          targets: aarch64-apple-ios

      # CACHE IS DISABLED
      # - name: Set up cache
      #   uses: ./.github/actions/set-up-cache
      #   with:
      #     cache_name: ${{ github.job }}-new-ios-release
          
      # Dependencies section
      - name: Install dependencies
        uses: ./.github/actions/install-deps

      # Build section
      - name: Cargo install
        timeout-minutes: 8
        run: cargo run -- install --targets ios

      - name: Set prod flag
        uses: ./.github/actions/set-prod-flag
        with:
          ref: ${{ inputs.ref || github.event.inputs.ref }}

      # The project's min_ios_version is 18.0, which needs the iOS 18 SDK → Xcode 16+.
      # The runner defaults to Xcode 15.4, so select 16.x explicitly (via DEVELOPER_DIR,
      # honored by xcrun/clang/gym for all later steps — no sudo needed).
      - name: Select Xcode 16.2 (iOS 18 SDK)
        run: |
          XCODE_APP="/Applications/Xcode_16.2.app"
          if [ ! -d "$XCODE_APP" ]; then
            echo "❌ $XCODE_APP not found on the runner. Installed Xcodes:"
            ls -d /Applications/Xcode*.app 2>/dev/null
            exit 1
          fi
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          "$XCODE_APP/Contents/Developer/usr/bin/xcodebuild" -version

      - name: Build MacOS
        timeout-minutes: 20
        run: cargo run -- build --release ${{ env.PROD_FLAG }}

      - name: Build iOS
        timeout-minutes: 20
        run: cargo run -- build --release --target ios ${{ env.PROD_FLAG }}

      - name: Import Assets
        uses: ./.github/actions/import-assets

      - name: Export
        timeout-minutes: 5
        run: cargo run -- export --target ios

      # --- Code signing material from the environment secrets ---
      - name: Prepare iOS signing
        env:
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -eu
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$IOS_DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/signing/dist.p12"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/signing/profile.mobileprovision"
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/signing/asc_key.p8"
          # Decode the profile to read its display Name + UUID (no secrets in here).
          security cms -D -i "$RUNNER_TEMP/signing/profile.mobileprovision" > "$RUNNER_TEMP/signing/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/signing/profile.plist")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/signing/profile.plist")
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/signing/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "Prepared signing for profile: $PROFILE_NAME"

      - name: Install fastlane (pinned 2.228.0)
        run: |
          # The runner ships a pre-installed fastlane, so install + invoke our exact
          # version explicitly (the `fastlane _x.y.z_` selector forces it).
          gem install fastlane -v 2.228.0 --no-document
          fastlane _2.228.0_ --version

      - name: Build, sign & upload to TestFlight
        timeout-minutes: 25
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_PATH: ${{ runner.temp }}/signing/asc_key.p8
          IOS_DIST_CERT_PATH: ${{ runner.temp }}/signing/dist.p12
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          # Free-text notes via env (never interpolated into the script).
          WHATS_NEW: ${{ inputs.whats_new || github.event.inputs.whats_new }}
        run: |
          set -eu
          if [ -z "${WHATS_NEW:-}" ]; then
            WHATS_NEW="$(git log -1 --pretty=%B | head -c 4000)"
            export WHATS_NEW
          fi
          UPLOAD=true
          if [ "${{ inputs.dry_run || github.event.inputs.dry_run }}" = "true" ]; then UPLOAD=false; fi
          echo "Upload to TestFlight: $UPLOAD"
          fastlane _2.228.0_ ios testflight upload:$UPLOAD

      # The app dSYMs live inside the archive produced by fastlane (XCARCHIVE_PATH).
      # The libdclgodot dSYM is uploaded by the existing step below.
      - name: Upload app dSYMs to Sentry
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECT:-}" ]; then
            echo "⚠️  Sentry secrets not set, skipping app dSYM upload"; exit 0
          fi
          if [ -z "${XCARCHIVE_PATH:-}" ] || [ ! -d "$XCARCHIVE_PATH/dSYMs" ]; then
            echo "⚠️  No dSYMs at ${XCARCHIVE_PATH:-<unset>}/dSYMs — skipping"; exit 0
          fi
          command -v sentry-cli >/dev/null 2>&1 || curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=3.5.1 bash
          sentry-cli upload-dif --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
            --auth-token "$SENTRY_AUTH_TOKEN" --wait "$XCARCHIVE_PATH/dSYMs"

      - name: Cleanup signing material
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/signing" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision || true
          security delete-keychain dcl-ci.keychain-db 2>/dev/null || true

      # Upload libdclgodot debug symbols to Sentry
      # Note: app dSYMs are uploaded by the "Upload app dSYMs to Sentry" step above
      # (from the fastlane archive); this uploads the CI-built libdclgodot.dylib dSYM.
      - name: Upload libdclgodot to Sentry
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "⚠️  Sentry secrets not configured, skipping upload"
            exit 0
          fi

          # Install sentry-cli
          command -v sentry-cli >/dev/null 2>&1 || curl -sL https://sentry.io/get-cli/ | SENTRY_CLI_VERSION=3.5.1 bash

          # Find libdclgodot.dylib
          LIBDCLGODOT_PATH="lib/target/libdclgodot_ios/libdclgodot.dylib"

          if [ -f "$LIBDCLGODOT_PATH" ]; then
            echo "Found libdclgodot at: $LIBDCLGODOT_PATH"

            # Upload to Sentry
            sentry-cli upload-dif \
              --org "$SENTRY_ORG" \
              --project "$SENTRY_PROJECT" \
              --auth-token "$SENTRY_AUTH_TOKEN" \
              --include-sources \
              --wait \
              "$LIBDCLGODOT_PATH"

            echo "✅ libdclgodot uploaded to Sentry"
          else
            echo "⚠️  libdclgodot not found at $LIBDCLGODOT_PATH"
            find lib/target -name "libdclgodot*" -type f 2>/dev/null || true
          fi

      - name: Notify Slack on Success (TestFlight)
        if: success() && inputs.dry_run != true && github.event.inputs.dry_run != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then echo "⚠️  SLACK_WEBHOOK_URL not set, skipping"; exit 0; fi
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          if [ -n "$PR_NUMBER" ]; then
            BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          else
            BRANCH_NAME="${REF}"
          fi
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGERED_BY="${{ github.actor }}"
          ASC_URL="https://appstoreconnect.apple.com/apps"

          curl -X POST -H 'Content-type: application/json' --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"🍏 iOS Build → TestFlight\", \"emoji\": true }
              },
              {
                \"type\": \"section\",
                \"text\": { \"type\": \"mrkdwn\", \"text\": \"*Decentraland Mobile Client*\niOS build uploaded to TestFlight (${BRANCH_NAME})\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Version:*\n\`${IOS_VERSION_STRING}\` (build \`${IOS_BUILD_NUMBER}\`)\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\n\`${BRANCH_NAME}\`\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Commit:*\n<${COMMIT_URL}|\`${COMMIT_SHORT}\`>\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Triggered by:*\n${TRIGGERED_BY}\" }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  { \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"🍏 Open App Store Connect\", \"emoji\": true }, \"style\": \"primary\", \"url\": \"${ASC_URL}\" },
                  { \"type\": \"button\", \"text\": { \"type\": \"plain_text\", \"text\": \"View Build Report\", \"emoji\": true }, \"url\": \"${WORKFLOW_URL}\" }
                ]
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
          echo "✅ Slack notification sent (iOS → TestFlight)"

      - name: Notify Slack on Failure
        if: failure() && !cancelled()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          if [ -n "$PR_NUMBER" ]; then
            BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          else
            BRANCH_NAME="${REF}"
          fi
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGERED_BY="${{ github.actor }}"

          curl -X POST -H 'Content-type: application/json' --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"❌ iOS Build Failed\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Branch:*\n\`${BRANCH_NAME}\`\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Commit:*\n<${COMMIT_URL}|\`${COMMIT_SHORT}\`>\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Triggered by:*\n${TRIGGERED_BY}\"
                  }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"View Logs\",
                      \"emoji\": true
                    },
                    \"style\": \"danger\",
                    \"url\": \"${WORKFLOW_URL}\"
                  }
                ]
              }
            ]
          }" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on Cancelled
        if: cancelled()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          if [ -n "$PR_NUMBER" ]; then
            BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          else
            BRANCH_NAME="${REF}"
          fi
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${COMMIT_SHA}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGERED_BY="${{ github.actor }}"

          curl -X POST -H 'Content-type: application/json' --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"⚠️ iOS Build Cancelled\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Branch:*\n\`${BRANCH_NAME}\`\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Commit:*\n<${COMMIT_URL}|\`${COMMIT_SHORT}\`>\"
                  },
                  {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Triggered by:*\n${TRIGGERED_BY}\"
                  }
                ]
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"View Logs\",
                      \"emoji\": true
                    },
                    \"url\": \"${WORKFLOW_URL}\"
                  }
                ]
              }
            ]
          }" "$SLACK_WEBHOOK_URL"

      - name: Update PR Comment - Success
        if: success() && (inputs.pr_number || github.event.inputs.pr_number)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          COMMENT_BODY="---

          ### 🍏 iOS Build Complete

          ✅ **Status**: Success — signed & uploaded to TestFlight

          🔗 **iOS Workflow**: [View build](${WORKFLOW_URL})

          🍏 **TestFlight**: [App Store Connect](https://appstoreconnect.apple.com/apps) — appears once Apple finishes processing the build

          📍 **Branch**: \`${BRANCH_NAME}\`

          🔄 **Completed**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Find and update the existing iOS comment
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("build-report-ios") or contains("iOS Build Triggered") or contains("iOS Build Complete") or contains("iOS Build Failed") or contains("iOS Build Cancelled")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments -f body="${COMMENT_BODY}"
          fi

      - name: Update PR Comment - Failure
        if: failure() && !cancelled() && (inputs.pr_number || github.event.inputs.pr_number)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          COMMENT_BODY="---

          ### 🍏 iOS Build Failed

          ❌ **Status**: Failed

          🔗 **iOS Workflow**: [View logs](${WORKFLOW_URL})

          📍 **Branch**: \`${BRANCH_NAME}\`

          🔄 **Failed**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Find and update the existing iOS comment
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("build-report-ios") or contains("iOS Build Triggered") or contains("iOS Build Complete") or contains("iOS Build Failed") or contains("iOS Build Cancelled")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments -f body="${COMMENT_BODY}"
          fi

      - name: Update PR Comment - Cancelled
        if: cancelled() && (inputs.pr_number || github.event.inputs.pr_number)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number || github.event.inputs.pr_number }}"
          REF="${{ inputs.ref || github.event.inputs.ref }}"
          BRANCH_NAME="PR-${PR_NUMBER}-${REF}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          COMMENT_BODY="---

          ### 🍏 iOS Build Cancelled

          ⚠️ **Status**: Cancelled

          🔗 **iOS Workflow**: [View logs](${WORKFLOW_URL})

          📍 **Branch**: \`${BRANCH_NAME}\`

          🔄 **Cancelled**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Find and update the existing iOS comment
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --jq '.[] | select(.body | contains("build-report-ios") or contains("iOS Build Triggered") or contains("iOS Build Complete") or contains("iOS Build Failed") or contains("iOS Build Cancelled")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${COMMENT_ID} -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments -f body="${COMMENT_BODY}"
          fi
